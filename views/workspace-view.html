<div id="workspaceBackdrop" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 9998; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;" onclick="toggleWorkspace(false)"></div>

    <div id="rxSmartClipboard" class="cortex-pop-sheet" style="position: fixed; top: 50%; left: 50%; width: 94%; max-width: 550px; height: 85vh; background: #0A0F1C; border-radius: 24px; box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 0 0 1px rgba(255, 255, 255, 0.05); transform: translate(-50%, 50%) scale(0.9); opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(0, 229, 255, 0.1);">

        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: radial-gradient(circle at 10% 0%, rgba(0, 229, 255, 0.1), transparent 50%); border-bottom: 1px solid rgba(255,255,255,0.05);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="width: 40px; height: 40px; border-radius: 50%; border: 1px dashed rgba(0,229,255,0.5); display: flex; align-items: center; justify-content: center; color: var(--brand-cyan); font-size: 1.2rem; box-shadow: 0 0 15px rgba(0,229,255,0.2);">⚡</div>
                <div>
                    <h3 style="margin: 0; color: #fff; font-size: 1.1rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;">Staging Console</h3>
                    <div style="font-size: 0.65rem; color: var(--brand-cyan); font-family: 'SF Mono', ui-monospace, monospace; font-weight: 800; letter-spacing: 0.5px;">AWAITING DEPLOYMENT</div>
                </div>
            </div>
            <button class="secondary" style="margin:0; padding:0; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:var(--text-muted); transition: background 0.2s;" onclick="toggleWorkspace(false)" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'">✕</button>
        </div>

        <div style="padding: 20px; overflow-y: auto; flex-grow: 1; padding-bottom: 100px; display: flex; flex-direction: column; gap: 20px;">

            <div id="clipboardRxList" style="display: flex; flex-direction: column; gap: 16px;">
                <div class="hud-empty-state" style="border: 1px dashed rgba(0,229,255,0.2); padding: 40px 0; font-size: 0.85rem; margin: 0; background: rgba(0, 229, 255, 0.02); border-radius: 16px; color: rgba(255,255,255,0.4);">Payload Empty. Calculate a dose to begin.</div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px;">
                <div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255, 51, 102, 0.15); border-radius: 16px; padding: 15px; position: relative;">
                    <div style="font-size: 0.7rem; color: var(--brand-pink); text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 6px;"><i class="ph-duotone ph-activity"></i> SYMPTOMS LOG</div>
                    
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                        <div style="display: flex; gap: 3px; align-items: center; height: 16px;">
                            <div class="wave-bar" style="animation-delay: 0.1s;"></div><div class="wave-bar" style="animation-delay: 0.3s; height: 10px;"></div><div class="wave-bar" style="animation-delay: 0.5s; height: 6px;"></div><div class="wave-bar" style="animation-delay: 0.2s; height: 12px;"></div><div class="wave-bar" style="animation-delay: 0.4s; height: 8px;"></div>
                        </div>
                        <div style="width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--brand-pink); color: var(--brand-pink); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(255,51,102,0.2);"><i class="ph-fill ph-microphone"></i></div>
                    </div>
                    
                    <textarea id="wsSymptoms" placeholder="Tap to dictate or type..." style="width: 100%; background: transparent; border: none; color: var(--text-main); font-family: 'SF Mono', ui-monospace, monospace; font-size: 0.85rem; min-height: 40px; resize: none; outline: none; line-height: 1.5;"></textarea>
                </div>

                <div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255, 176, 32, 0.15); border-radius: 16px; padding: 15px; position: relative; overflow: hidden;">
                    <i class="ph-duotone ph-shield-check" style="position: absolute; right: -15px; bottom: -15px; font-size: 6rem; color: rgba(255, 176, 32, 0.05);"></i>
                    <div style="font-size: 0.7rem; color: var(--warning); text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; position: relative; z-index: 2;"><i class="ph-duotone ph-shield"></i> CARE DIRECTIVES</div>
                    
                    <textarea id="wsAdvice" placeholder="Auto-generated..." style="width: 100%; background: transparent; border: none; color: var(--text-main); font-family: inherit; font-size: 0.85rem; min-height: 80px; resize: none; outline: none; position: relative; z-index: 2; line-height: 1.6;"></textarea>
                </div>
            </div>

        </div>

        <div style="position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 15px; width: 90%; max-width: 460px; z-index: 10000;">
            
            <button class="secondary" style="flex: 1; margin: 0; padding: 16px; border-radius: 40px; border: 1px solid rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.05); color: var(--danger); font-size: 0.9rem; font-weight: 800; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;" onclick="clearWorkspace()">
                <span style="display: flex; align-items: center; gap: 6px;"><i class="ph-bold ph-x"></i> ABORT</span>
                <span style="font-size: 0.6rem; color: rgba(239, 68, 68, 0.6); font-weight: 600;">Discard Prescription</span>
            </button>
            
            <button id="deployRxBtn" class="btn-deploy-rx" style="flex: 1.5; margin: 0; padding: 16px; border-radius: 40px; border: 1px solid rgba(0,229,255,0.4); background: linear-gradient(135deg, #0A4A8C, var(--brand-blue)); color: #fff; font-size: 1rem; font-weight: 900; letter-spacing: 0.5px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;" onclick="executeDeploySequence()">
                <span style="display: flex; align-items: center; gap: 8px;"><i class="ph-fill ph-paper-plane-tilt"></i> DEPLOY RX</span>
                <span style="font-size: 0.6rem; color: rgba(255,255,255,0.7); font-weight: 600;">Send Prescription</span>
            </button>
        </div>
    </div>
